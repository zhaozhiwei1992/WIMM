logging:
  level:
    ROOT: INFO
    tech.jhipster: INFO
    com.example: INFO

knife4j:
  enable: true
  # 开启生产环境屏蔽
  production: true

management:
  metrics:
    export:
      prometheus:
        enabled: false

spring:
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/wimm # PostgreSQL 连接示例, 库名小写 wimm
    username: wimm
    password: wimm
  jpa:
    hibernate:
      #      ddl-auto: create-drop
      ddl-auto: update
    generateDdl: false
  # Replace by 'prod, faker' to add the faker context and have sample data loaded in production
  liquibase:
    contexts: prod
  mail:
    host: localhost
    port: 25
    username:
    password:
  thymeleaf:
    cache: true
server:
  # 后端走 HTTP(8091): HTTPS 由公网 nginx 终结, 后端不再套自签证书层
  # 之前端口冲突, 从 8090 改为 8091; nginx 反代目标也是 8091
  port: 8091
  ssl:
    enabled: false
# ===================================================================
# Ifmis specific properties
#
# ===================================================================
z:
  module:
    system:
  cors:
    # Allow Ionic for JHipster by default (* no longer allowed in Spring Boot 2.4+)
    # 注意: 前端必须是localhost访问, 如果用127.0.0.1还是会拦截, 这里修改为实际域名
    # 4000是admin-vue3, 8080: z-ui-app
#    allowed-origins: 'http://dev.com:8090,https://dev.com:8090,http://dev.com,https://dev.com'
    allowed-origins:
      # 公网部署: 经 https://19921514.xyz/wimm/ 访问(admin 同源请求也会带 Origin, 必须授权)
      - https://19921514.xyz
      # 微信小程序: 真机/线上一般不发 Origin(不触发 CORS), 但开发者工具与部分版本会带
      - https://servicewechat.com
      # 本地开发调试(后端已改 HTTP 8091)
      - http://localhost:8091
      - https://localhost:8091
      - http://localhost:5173
      - https://localhost:5173
      - http://localhost:3000
      - https://localhost:3000
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${z.app.name}-alert,X-${z.app.name}-error,X-${z.app.name}-params'
    allow-credentials: true
    max-age: 1800
  security:
    authentication:
      jwt:
        base64-secret: OTYwZmRhYWZiOWY1NzJlYTMxOTkwMDI4NGQ2NzZiODU3ZDcxM2I5OGE1OTViZjQyZDZhNzBlNDcwMzM4MTQ1MWRkMjNmYTUyMjYyN2FhZWJlZGYxZjgzNWFmNTBhM2RlOGM1OWZhYTNhYTMwNDk2NzM1NGU0ZjYwOTM1Mzg5YTk=
        # Token is valid 24 hours
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
