services:
  wimm-postgres:
    # PostgreSQL 16, Alpine 版本体积更小
    image: postgres:16-alpine
    hostname: wimm-postgres
    networks:
      - wimm-net
    ports:
      - "5432:5432"
      #    restart: always
    volumes:
      # PG 数据目录, 首次启动会自动初始化
      - "${HOME}/docker/postgresql/data:/var/lib/postgresql/data"
    environment:
      # 首次启动镜像会根据以下变量自动创建数据库与用户
      - POSTGRES_DB=wimm
      - POSTGRES_USER=wimm
      - POSTGRES_PASSWORD=wimm
      # 容器时区
      - TZ=Asia/Shanghai
      - PGTZ=Asia/Shanghai
